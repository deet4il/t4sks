    <script>
        // --- DATA RECOVERY MIGRATION (v13.1.9) ---
        (function migrateData() {
            const migrations = [
                { old: 'gwapo_tasks_v6', new: 'm_tasks' },
                { old: 'gwapo_dex_v4', new: 'm_dex' },
                { old: 'gwapo_xp_v2', new: 'm_xp' },
                { old: 'gwapo_be_v2', new: 'm_be' },
                { old: 'gwapo_badges_v2', new: 'm_badges' },
                { old: 'gwapo_m_charges', new: 'm_charges' },
                { old: 'gwapo_m_battery', new: 'm_battery' },
                { old: 'gwapo_categories_v2', new: 'm_arcs' }
            ];
            migrations.forEach(m => {
                let oldData = localStorage.getItem(m.old);
                let newData = localStorage.getItem(m.new);
                if (oldData && (!newData || newData === '[]' || newData === '0' || newData === 'null')) {
                    let parsed = JSON.parse(oldData);
                    if (m.new === 'm_tasks' && Array.isArray(parsed)) {
                        parsed = parsed.map(t => ({
                            ...t, done: t.done !== undefined ? t.done : t.completed,
                            mb: t.mb !== undefined ? t.mb : t.isMasterBall,
                            desc: t.desc || t.description || "Kanto Pokemon",
                            name: t.pokeName || t.name
                        }));
                    }
                    if (m.new === 'm_dex' && Array.isArray(parsed)) {
                        parsed = parsed.map(p => ({
                            ...p, name: p.name || p.pokeName,
                            desc: p.desc || p.description || "A mysterious Pokémon.",
                            shiny: p.shiny !== undefined ? p.shiny : p.isShiny,
                            tID: p.tID || p.taskID,
                            lvl: p.lvl || p.catchLevel || 1
                        }));
                    }
                    localStorage.setItem(m.new, JSON.stringify(parsed));
                }
            });
        })();

        let newWorker;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            document.getElementById('updateToast').classList.remove('hidden');
                        }
                    });
                });
            });
        }
        function applyUpdate() { if (newWorker) newWorker.postMessage({ type: 'SKIP_WAITING' }); }
        navigator.serviceWorker.addEventListener('controllerchange', () => { window.location.reload(); });
    </script>

        .category-header { border-left: 4px solid #a855f7; padding-left: 12px; }
        .shiny-card { background: radial-gradient(circle, rgba(253,224,71,0.15) 0%, rgba(30, 41, 59, 0.4) 100%) !important; border: 1px solid #fde047 !important; }
        .action-pillar { min-width: 36px; border-left: 1px solid rgba(255,255,255,0.05); }
        .hp-bar-container { background: #450a0a; border: 1px solid #000; height: 8px; border-radius: 4px; overflow: hidden; }

            <p class="text-[9px] pixel-font text-slate-500 uppercase mt-4">v13.1.9 Type Master</p>

    <script>
        const GYMS = [
            { l: 3, leader: "Brock", badge: "Boulder", type: "rock", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/1.png", squad: [{id:74, n:"GEODUDE"}, {id:111, n:"RHYHORN"}, {id:95, n:"ONIX"}] },
            { l: 6, leader: "Misty", badge: "Cascade", type: "water", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/2.png", squad: [{id:120, n:"STARYU"}, {id:117, n:"SEADRA"}, {id:121, n:"STARMIE"}] },
            { l: 9, leader: "Lt. Surge", badge: "Thunder", type: "electric", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/3.png", squad: [{id:100, n:"VOLTORB"}, {id:25, n:"PIKACHU"}, {id:26, n:"RAICHU"}] },
            { l: 12, leader: "Erika", badge: "Rainbow", type: "grass", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/4.png", squad: [{id:71, n:"VICTREEBEL"}, {id:114, n:"TANGELA"}, {id:45, n:"VILEPLUME"}] },
            { l: 15, leader: "Koga", badge: "Soul", type: "poison", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/5.png", squad: [{id:49, n:"VENOMOTH"}, {id:89, n:"MUK"}, {id:110, n:"WEEZING"}] },
            { l: 18, leader: "Sabrina", badge: "Marsh", type: "psychic", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/6.png", squad: [{id:64, n:"KADABRA"}, {id:122, n:"MR. MIME"}, {id:65, n:"ALAKAZAM"}] },
            { l: 21, leader: "Blaine", badge: "Volcano", type: "fire", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/7.png", squad: [{id:58, n:"GROWLITHE"}, {id:77, n:"PONYTA"}, {id:59, n:"ARCANINE"}] },
            { l: 24, leader: "Giovanni", badge: "Earth", type: "ground", img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/trainers/8.png", squad: [{id:34, n:"NIDOKING"}, {id:31, n:"NIDOQUEEN"}, {id:112, n:"RHYDON"}] }
        ];

        const TYPE_MAP = {
            "rock": ["water", "grass", "fighting", "ground"],
            "water": ["grass", "electric"],
            "electric": ["ground"],
            "grass": ["fire", "ice", "poison", "flying", "bug"],
            "poison": ["ground", "psychic"],
            "psychic": ["bug", "ghost", "dark"],
            "fire": ["water", "ground", "rock"],
            "ground": ["water", "grass", "ice"]
        };

        const LEGENDARY_FALLBACK = {
            144: { name: "ARTICUNO", type: "ice", desc: "A legendary bird Pokémon." },
            145: { name: "ZAPDOS", type: "electric", desc: "A legendary bird Pokémon." },
            146: { name: "MOLTRES", type: "fire", desc: "A legendary bird Pokémon." },
            150: { name: "MEWTWO", type: "psychic", desc: "A science-created Pokémon." },
            151: { name: "MEW", type: "psychic", desc: "A mythical Pokémon." }
        };

        let be = JSON.parse(localStorage.getItem('m_be')) || 0;
        let badges = JSON.parse(localStorage.getItem('m_badges')) || [];
        let whitedOut = JSON.parse(localStorage.getItem('m_whiteout')) || false;
        let dex = JSON.parse(localStorage.getItem('m_dex')) || [];
        let tasks = JSON.parse(localStorage.getItem('m_tasks')) || [];
        let arcs = JSON.parse(localStorage.getItem('m_arcs')) || [];
        let xp = JSON.parse(localStorage.getItem('m_xp')) || 0;
        let battery = JSON.parse(localStorage.getItem('m_battery')) || 0;
        let charges = JSON.parse(localStorage.getItem('m_charges')) || 0;
        let collapsedArcs = JSON.parse(localStorage.getItem('m_coll_arcs')) || [];
        let dexCollapsed = JSON.parse(localStorage.getItem('m_dex_coll')) || false;
        let doneCollapsed = JSON.parse(localStorage.getItem('m_done_coll')) || false;
        let gymHP = JSON.parse(localStorage.getItem('m_gym_hp')) || null;

        let editingId = null; let expandedId = null; let dexExpId = null;
        let pTeam = []; let bTeam = []; let pActive = 0; let bActive = 0;

        const getArt = (id) => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;

        function getXPLimit() { 
            const hasCascade = badges.some(b => b.toLowerCase() === "cascade");
            return hasCascade ? 475 : 500; 
        }
        function getLvl() { return Math.floor(xp / getXPLimit()) + 1; }

        function checkDailyReset() {
            const today = new Date().toISOString().split('T')[0];
            let changed = false;
            tasks.forEach(q => {
                const arc = arcs.find(a => a.name === q.category);
                if (arc && arc.daily && q.done && q.last !== today) { q.done = false; changed = true; }
            });
            if (changed) save();
        }

        async function addQuest() {
            const i = document.getElementById('taskInput'); const c = document.getElementById('categorySelect').value;
            const btn = document.getElementById('addButton');
            if (!i.value.trim() || arcs.length === 0) return;
            btn.innerText = "..."; btn.disabled = true;
            const id = Math.floor(Math.random() * 151) + 1;
            try {
                const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`); const d = await r.json();
                const sr = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`); const sd = await sr.json();
                tasks.push({
                    id: Date.now(), text: i.value.trim(), category: c, done: false, mb: false,
                    pokeID: id, name: d.name.toUpperCase(), type: d.types[0].type.name,
                    lvl: getLvl(), desc: sd.flavor_text_entries.find(e => e.language.name === 'en').flavor_text.replace(/[\f\n\r]/g, ' ')
                });
                i.value = ''; save();
            } catch (e) {
                tasks.push({ id: Date.now(), text: i.value.trim(), category: c, done: false, mb: false, pokeID: id, name: "POKEMON", type: "normal", lvl: getLvl(), desc: "A wild Kanto encounter." });
                i.value = ''; save();
            } finally { btn.innerText = "+"; btn.disabled = false; }
        }

        function toggleQuest(id) {
            const q = tasks.find(t => t.id === id); const arc = arcs.find(a => a.name === q.category);
            q.done = !q.done;
            if (q.done) {
                if (whitedOut) whitedOut = false;
                q.last = new Date().toISOString().split('T')[0];
                let bg = q.mb ? 50 : (arc && arc.daily ? 5 : 15);
                if (badges.some(b => b.toLowerCase() === "boulder") && arc && arc.daily) bg = Math.round(bg * 1.15);
                be += bg;
                let xg = q.mb ? 150 : 50; if (badges.some(b => b.toLowerCase() === "rainbow")) xg = Math.round(xg * 1.1); xp += xg;
                battery++; if (battery >= (badges.some(b => b.toLowerCase() === "thunder") ? 4 : 5)) { charges++; battery = 0; }
                if (!dex.find(p => p.tID === q.id)) {
                    const s = Math.floor(Math.random() * ((badges.some(b => b.toLowerCase() === "soul") && q.mb) ? 5 : 10)) === 0;
                    dex.push({ tID: q.id, pokeID: q.pokeID, name: q.name, type: q.type, shiny: s, desc: q.desc, lvl: q.lvl });
                }
            } else { dex = dex.filter(p => p.tID !== q.id); xp = Math.max(0, xp - 50); }
            save();
        }

        function openGym() {
            const g = GYMS.find(g => getLvl() >= g.l && !badges.includes(g.badge)); if (!g) return;
            toggleBattleScreen(true);
            document.getElementById('gymTitle').innerText = `${g.leader}`;
            document.getElementById('leaderImg').src = g.img;
            document.getElementById('battleLog').innerHTML = `> Battle log cleared.`;
            document.getElementById('teamPicker').classList.remove('hidden');
            document.getElementById('battleMoves').classList.add('hidden');
            if (!gymHP || gymHP.badge !== g.badge) { bTeam = g.squad.map(p => ({ ...p, hp: 100 })); } else { bTeam = gymHP.squad; }
            pTeam = []; bActive = bTeam.findIndex(p => p.hp > 0); pActive = 0;
            const p = document.getElementById('teamPicker'); p.innerHTML = '';
            const eligible = dex.filter(x => x.lvl <= g.l);
            eligible.forEach(x => {
                const card = document.createElement('img'); card.src = getArt(x.pokeID);
                card.className = "w-10 h-10 pixelated border border-slate-700 rounded cursor-pointer";
                card.onclick = () => pickTeam(x); p.appendChild(card);
            });
            upUI();
        }

        function pickTeam(x) {
            if (pTeam.length < 3 && !pTeam.find(t => t.tID === x.tID)) {
                pTeam.push({ ...x, hp: 100 }); upUI();
                if (pTeam.length === 3) {
                    document.getElementById('teamPicker').classList.add('hidden');
                    document.getElementById('battleMoves').classList.remove('hidden');
                    addLog("Squad assembled. Battle on!");
                }
            }
        }

        function addLog(msg) {
            const log = document.getElementById('battleLog');
            log.innerHTML += `<br>> ${msg}`;
            log.scrollTop = log.scrollHeight;
        }

        function upUI() {
            const ba = bTeam[bActive]; const pa = pTeam[pActive];
            if(ba) { document.getElementById('sprite-boss-active').src = getArt(ba.id); document.getElementById('hp-boss-active').style.width = ba.hp + '%'; document.getElementById('bossActiveName').innerText = ba.n; }
            if(pa) { document.getElementById('sprite-player-active').src = getArt(pa.pokeID); document.getElementById('hp-player-active').style.width = pa.hp + '%'; document.getElementById('playerActiveName').innerText = pa.name; }
            
            const bBench = document.getElementById('bossBench'); bBench.innerHTML = '';
            bTeam.forEach((p, idx) => { if(idx !== bActive) bBench.innerHTML += `<img src="${getArt(p.id)}" class="w-8 h-8 pixelated ${p.hp <= 0 ? 'grayscale opacity-20' : ''}">`; });
            const pBench = document.getElementById('playerBench'); pBench.innerHTML = '';
            pTeam.forEach((p, idx) => { if(idx !== pActive) pBench.innerHTML += `<img src="${getArt(p.pokeID)}" class="bench-sprite pixelated ${p.hp <= 0 ? 'grayscale opacity-20' : ''}">`; });
            
            document.getElementById('battleBEMeter').style.width = Math.min(100, be) + '%';
        }

        function executeMove(type) {
            if (pActive >= 3 || bActive >= 3) return;
            let cost = type === 'basic' ? 10 : (type === 'elemental' ? 30 : 100); if (be < cost) { addLog("Insufficient energy!"); return; }
            be -= cost; let dmg = type === 'basic' ? 15 : (type === 'elemental' ? 30 : 80);
            const p = pTeam[pActive]; const b = bTeam[bActive];
            if (type === 'elemental') {
                if (p.shiny) dmg *= 1.2;
                const g = GYMS.find(g => !badges.includes(g.badge));
                const weaknesses = TYPE_MAP[g.type] || [];
                if (weaknesses.includes(p.type)) { dmg *= 2.5; addLog("SUPER EFFECTIVE HIT!"); }
            }
            b.hp -= dmg; addLog(`${p.name} dealt ${Math.round(dmg)} damage.`);
            if (b.hp <= 0) { b.hp = 0; bActive++; addLog(`${b.n} fainted!`); }
            if (bActive < 3) {
                let bd = 12 + (getLvl() * 2); 
                p.hp -= bd; addLog(`${bTeam[bActive].n} counter-attacks for ${bd}.`);
                if (p.hp <= 0) { p.hp = 0; pActive++; addLog(`${p.name} whited out!`); }
            }
            upUI(); checkEnd();
        }

        function checkEnd() {
            const g = GYMS.find(g => !badges.includes(g.badge));
            gymHP = { badge: g.badge, squad: bTeam }; localStorage.setItem('m_gym_hp', JSON.stringify(gymHP));
            if (bActive >= 3) { alert(`Victory! ${g.badge.toUpperCase()} Badge earned!`); badges.push(g.badge); gymHP = null; localStorage.removeItem('m_gym_hp'); toggleBattleScreen(false); save(); }
            else if (pActive >= 3) { alert("Team defeated!"); whitedOut = true; toggleBattleScreen(false); render(); }
        }

        function save() {
            localStorage.setItem('m_xp', JSON.stringify(xp)); localStorage.setItem('m_be', JSON.stringify(be));
            localStorage.setItem('m_tasks', JSON.stringify(tasks)); localStorage.setItem('m_dex', JSON.stringify(dex));
            localStorage.setItem('m_charges', JSON.stringify(charges)); localStorage.setItem('m_battery', JSON.stringify(battery));
            localStorage.setItem('m_whiteout', JSON.stringify(whitedOut)); localStorage.setItem('m_badges', JSON.stringify(badges));
            render();
        }

        function render() {
            const s = document.getElementById('activeCampaign'); const cGrid = document.getElementById('dexGrid');
            const dList = document.getElementById('doneList'); const cSel = document.getElementById('categorySelect'); if (!s) return;
            s.innerHTML = ''; cGrid.innerHTML = ''; dList.innerHTML = '';
            const cur = cSel.value; cSel.innerHTML = '';
            arcs.forEach(a => { cSel.innerHTML += `<option value="${a.name}" ${a.name === cur ? 'selected' : ''}>${a.name}</option>`; });
            const lvl = getLvl(); const g = GYMS.find(g => lvl >= g.l && !badges.includes(g.badge));
            document.getElementById('gymBanner').classList.toggle('hidden', !g || whitedOut);
            document.getElementById('whiteOutBox').classList.toggle('hidden', !whitedOut);
            arcs.forEach(arc => {
                const act = tasks.filter(t => t.category === arc.name && !t.done);
                if (act.length > 0) {
                    const coll = collapsedArcs.includes(arc.name);
                    let items = act.map(t => `
                        <div class="task-card p-3 rounded-xl flex items-center gap-4 ${t.mb ? 'master-priority' : ''}">
                            <img src="${getArt(t.pokeID)}" class="w-10 h-10 pixelated brightness-0 opacity-10">
                            <div class="flex-grow min-w-0">
                                ${editingId === t.id ? `<input id="edit-${t.id}" type="text" value="${t.text}" class="w-full bg-black/40 border-b border-purple-500 text-sm py-1 outline-none" onkeypress="if(event.key === 'Enter') saveEdit(${t.id})" onblur="saveEdit(${t.id})">` : `<p onclick="expandedId = expandedId === ${t.id} ? null : ${t.id}; render();" class="text-sm font-semibold task-text ${expandedId === t.id ? 'expanded' : 'truncate'}">${t.text}</p>`}
                            </div>
                            <div class="action-pillar flex flex-col items-center gap-2 pl-2">
                                <button onclick="delT(${t.id})" class="w-4 h-4 text-slate-700">${TRASH_ICON}</button>
                                <button onclick="setMB(${t.id})" class="w-4 h-4 ${t.mb ? 'text-purple-400' : 'text-slate-700'}">${MASTER_STAR}</button>
                                <button onclick="editT(${t.id})" class="w-4 h-4 text-slate-700">${EDIT_ICON}</button>
                                <button onclick="toggleQuest(${t.id})" class="text-green-500 font-bold text-xl">✓</button>
                            </div>
                        </div>`).join('');
                    s.innerHTML += `<div class="mb-6"><div onclick="toggleArc('${arc.name}')" class="category-header flex justify-between p-2 rounded-lg mb-2 ${arc.daily ? 'daily-arc-header bg-blue-900/5' : ''}"><h3 class="pixel-font text-[7px] ${arc.daily ? 'text-blue-400' : 'text-purple-400'} uppercase">${arc.name}</h3><svg class="chevron w-3 h-3 ${coll ? 'collapsed' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg></div><div class="${coll ? 'hidden' : 'space-y-3'}">${items}</div></div>`;
                }
            });
            if (!dexCollapsed) {
                const unq = []; dex.forEach(p => { if(!unq.find(u => u.pokeID === p.pokeID && u.shiny === p.shiny)) unq.push(p); });
                cGrid.innerHTML = unq.map(p => `<div class="dex-card p-3 ${p.shiny ? 'shiny-card' : ''}" onclick="dexExpId = dexExpId === '${p.tID}' ? null : '${p.tID}'; render();"><div class="flex items-center gap-3"><img src="${p.shiny ? getArt(p.pokeID) : getArt(p.pokeID)}" class="w-10 h-10 pixelated ${p.shiny ? 'filter brightness-125' : ''}"><span class="text-[8px] pixel-font text-green-400 uppercase">${p.name}${p.shiny?'✨':''}</span></div><div class="${dexExpId === String(p.tID) ? 'block' : 'hidden'} mt-2 text-[10px] text-slate-300 italic">${p.desc}</div></div>`).join('');
            }
            if (!doneCollapsed) dList.innerHTML = tasks.filter(t => t.done).map(t => `<div class="flex justify-between p-2 bg-slate-900/30 rounded border border-white/5"><span class="text-xs line-through text-slate-500 truncate">${t.text}</span><button onclick="toggleQuest(${t.id})" class="text-[8px] text-purple-400 font-bold uppercase">Undo</button></div>`).join('');
            document.getElementById('lvl-text').innerText = `LVL ${lvl}`;
            document.getElementById('xp-text').innerText = `${xp % getXPLimit()} / ${getXPLimit()}`;
            document.getElementById('xp-fill').style.width = (xp % getXPLimit() / (getXPLimit()/100)) + '%';
            document.getElementById('stat-dex').innerText = dex.length;
            document.getElementById('stat-be').innerText = be;
            document.getElementById('stat-charges').innerText = charges;
            let dots = ""; for(let i=0; i < (badges.some(b => b.toLowerCase() === "thunder") ? 4 : 5); i++) dots += `<div class="w-1.5 h-1.5 rounded-full ${i < battery ? 'bg-purple-500' : 'bg-slate-800'}"></div>`;
            document.getElementById('charge-dots').innerHTML = dots;
            document.getElementById('badge-container').innerHTML = badges.map(b => `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${b.toLowerCase()}-badge.png" class="w-7 h-7 pixelated" title="${b} Badge active">`).join('');
        }

        function toggleBattleScreen(v) { if (!v && bTeam.length > 0) { const g = GYMS.find(g => !badges.includes(g.badge)); gymHP = { badge: g.badge, squad: bTeam }; localStorage.setItem('m_gym_hp', JSON.stringify(gymHP)); } document.getElementById('battleScreen').classList.toggle('hidden', !v); }
        function toggleManual() { document.getElementById('appManual').classList.toggle('hidden'); }
        function toggleArcMenu() { document.getElementById('arcMenu').classList.toggle('hidden'); }
        function delT(id) { if(confirm("Delete Quest?")){ tasks = tasks.filter(t => t.id !== id); dex = dex.filter(p => p.tID !== id); save(); } }
        function editT(id) { editingId = id; render(); const i = document.getElementById(`edit-${id}`); if(i){ i.focus(); i.select(); } }
        function saveEdit(id) { const i = document.getElementById(`edit-${id}`); if (i && i.value.trim()) { tasks.find(t => t.id === id).text = i.value.trim(); } editingId = null; save(); }
        async function setMB(id) {
            const q = tasks.find(t => t.id === id); if(q.mb) { q.mb = false; save(); return; }
            if (charges <= 0) { alert("Insufficient charges!"); return; }
            const lids = [144, 145, 146, 150, 151]; const lid = lids[Math.floor(Math.random()*5)];
            try {
                const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${lid}`); const d = await r.json();
                const sr = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${lid}`); const sd = await sr.json();
                q.mb = true; q.pokeID = lid; q.name = d.name.toUpperCase();
                q.desc = sd.flavor_text_entries.find(e => e.language.name === 'en').flavor_text.replace(/[\f\n\r]/g, ' '); 
                charges--; save();
            } catch (e) {
                const fb = LEGENDARY_FALLBACK[lid];
                q.mb = true; q.pokeID = lid; q.name = fb.name; q.desc = fb.desc;
                charges--; save();
            }
        }
        function toggleArc(n) { if(collapsedArcs.includes(n)) collapsedArcs = collapsedArcs.filter(x => x !== n); else collapsedArcs.push(n); localStorage.setItem('m_coll_arcs', JSON.stringify(collapsedArcs)); render(); }
        function toggleDex() { dexCollapsed = !dexCollapsed; localStorage.setItem('m_dex_coll', dexCollapsed); render(); }
        function toggleDone() { doneCollapsed = !doneCollapsed; localStorage.setItem('m_done_coll', doneCollapsed); render(); }
        function wipe() { if(confirm("Erase all progress?")){ localStorage.clear(); location.reload(); } }

        checkDailyReset(); render();
    </script>
</body>
</html>
