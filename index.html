<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOTTA DO 'EM ALL</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4c1d95">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/188/188918.png">

    <script>
        let newWorker;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        // Check if the new code has finished downloading
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Show the purple "New Patch" bar
                            document.getElementById('updateToast').classList.remove('hidden');
                        }
                    });
                });
            });
        }

        // Reload the page automatically once the new worker takes over
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; min-height: 100vh; }
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        .header-bg { background: linear-gradient(180deg, #6b21a8 0%, #4c1d95 100%); border-bottom: 6px solid #000; }
        .xp-bar-container { background: #1e1b4b; border: 2px solid #000; height: 12px; border-radius: 6px; overflow: hidden; }
        #xp-fill { background: linear-gradient(90deg, #22c55e, #4ade80); width: 0%; transition: width 0.5s ease-in-out; height: 100%; }
        .task-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s; }
        .pixelated { image-rendering: pixelated; }
        .dex-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .category-header { border-left: 4px solid #a855f7; padding-left: 12px; margin-top: 24px; margin-bottom: 12px; }
    </style>
</head>
<body class="pb-24 text-left">
    <div id="updateToast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-sm bg-purple-600 border-2 border-white p-4 rounded-xl shadow-2xl flex justify-between items-center">
        <p class="pixel-font text-[8px] text-white">NEW PATCH AVAILABLE!</p>
        <button onclick="applyUpdate()" class="bg-white text-purple-600 px-3 py-1 rounded-lg font-bold text-[10px] uppercase">Update</button>
    </div>

    <header class="header-bg w-full py-6 text-center shadow-2xl mb-8">
        <h1 class="pixel-font text-lg text-white mb-4 uppercase tracking-tighter">Gotta Do 'Em All</h1>
        
        <div class="max-w-xs mx-auto px-4">
            <div class="flex justify-between items-center mb-1">
                <span class="pixel-font text-[7px] text-green-400">XP LEVEL</span>
                <span id="xp-text" class="pixel-font text-[7px]">0 XP</span>
            </div>
            <div class="xp-bar-container"><div id="xp-fill"></div></div>
        </div>

        <div class="flex justify-center gap-10 mt-6">
            <div class="text-center">
                <p class="text-[7px] pixel-font text-purple-300 mb-1">DEX COUNT</p>
                <p id="stat-dex" class="text-lg font-black text-white">0</p>
            </div>
            <div class="text-center">
                <p class="text-[7px] pixel-font text-purple-300 mb-1">SUCCESS</p>
                <p id="stat-percent" class="text-lg font-black text-purple-400">0%</p>
            </div>
        </div>
    </header>

    <div class="max-w-xl mx-auto px-4">
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 mb-8 shadow-xl text-left">
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <input id="taskInput" type="text" placeholder="Add a new quest..." 
                        onkeypress="if(event.key === 'Enter') addQuest()"
                        class="flex-grow bg-black/50 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500 transition-all">
                    <button id="addButton" onclick="addQuest()" class="bg-purple-600 hover:bg-purple-500 text-white px-6 rounded-xl font-bold">+</button>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="pixel-font text-[7px] text-slate-500 uppercase">Current Mission:</span>
                        <select id="categorySelect" class="bg-slate-800 border border-slate-700 text-[10px] px-2 py-1 rounded-lg outline-none text-purple-300"></select>
                    </div>
                    <button onclick="manageMissions()" class="text-[7px] pixel-font text-purple-500 hover:text-white uppercase tracking-tighter">Manage Arcs</button>
                </div>
            </div>
        </div>

        <div id="missionManager" class="hidden bg-purple-900/20 p-4 rounded-xl border border-purple-500/30 mb-8 text-left">
            <h3 class="pixel-font text-[8px] mb-4 text-purple-300 uppercase">Mission Architect</h3>
            <div class="flex gap-2 mb-4">
                <input id="newCatInput" type="text" placeholder="Define New Arc..." class="flex-grow bg-black/40 border border-purple-500/30 rounded-lg px-3 py-2 text-xs outline-none">
                <button onclick="addNewCategory()" class="bg-purple-500 text-white px-4 rounded-lg text-xs font-bold">CREATE</button>
            </div>
            <div id="catList" class="flex flex-wrap gap-2"></div>
            <button onclick="manageMissions()" class="mt-4 text-[7px] pixel-font text-slate-400 block mx-auto uppercase">Close Architect</button>
        </div>

        <div class="mb-10 text-left">
            <h2 class="pixel-font text-[9px] mb-4 text-slate-500 flex justify-between items-center tracking-widest uppercase">
                <span>Active Campaign</span>
                <span id="pendingCount" class="bg-red-900/30 text-red-400 px-2 py-1 rounded text-[7px]">0 ONGOING</span>
            </h2>
            <div id="storyContainer" class="space-y-6"></div>
        </div>

        <div class="mt-12 p-4 bg-black/30 rounded-2xl border border-slate-800">
            <h2 class="pixel-font text-[9px] mb-6 text-green-500 tracking-widest text-center uppercase">Pokédex</h2>
            <div id="collectionGrid" class="grid grid-cols-3 gap-3 text-center"></div>
        </div>

        <div class="mt-8 text-center">
            <h2 class="pixel-font text-[9px] mb-4 text-slate-500 tracking-widest uppercase">Mission Report</h2>
            <div id="doneList" class="space-y-2 opacity-60"></div>
        </div>

        <div class="mt-16 pt-8 border-t border-slate-800 text-center">
            <button onclick="clearAll()" class="text-[8px] pixel-font text-slate-700 hover:text-red-500 transition uppercase">Delete All Data</button>
            <p class="text-[8px] pixel-font text-slate-900 mt-4 uppercase">Master Ball OS v10.0</p>
        </div>
    </div>

    <script>
        let categories = JSON.parse(localStorage.getItem('gwapo_categories_v2')) || [];
        let quests = JSON.parse(localStorage.getItem('gwapo_tasks_v5')) || [];
        let dex = JSON.parse(localStorage.getItem('gwapo_dex_v3')) || [];
        let totalXP = JSON.parse(localStorage.getItem('gwapo_xp')) || 0;

        // NEW: Function to manually trigger the Service Worker update
        function applyUpdate() {
            if (newWorker) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
        }

        async function addQuest() {
            const input = document.getElementById('taskInput');
            const categorySelect = document.getElementById('categorySelect');
            const btn = document.getElementById('addButton');
            if (categories.length === 0) {
                alert("Please create a Mission Arc first!");
                manageMissions();
                return;
            }
            if (!input.value.trim()) return;
            btn.innerText = "...";
            btn.disabled = true;
            const pokeID = Math.floor(Math.random() * 649) + 1;
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokeID}`);
                const data = await response.json();
                const pokeName = data.name.charAt(0).toUpperCase() + data.name.slice(1);
                quests.push({
                    id: Date.now(),
                    text: input.value.trim(),
                    category: categorySelect.value,
                    pokeID: pokeID,
                    pokeName: pokeName,
                    completed: false
                });
                input.value = '';
                save();
            } catch (err) {
                console.error("API Error:", err);
                alert("Connection failed!");
            } finally {
                btn.innerText = "+";
                btn.disabled = false;
            }
        }

        function manageMissions() {
            const manager = document.getElementById('missionManager');
            manager.classList.toggle('hidden');
            renderCategories();
        }

        function addNewCategory() {
            const input = document.getElementById('newCatInput');
            const newName = input.value.trim();
            if (newName && !categories.includes(newName)) {
                categories.push(newName);
                input.value = '';
                saveCategories();
            }
        }

        function removeCategory(cat) {
            if (confirm(`Delete the "${cat}" Arc? Tasks inside will lose their category label.`)) {
                categories = categories.filter(c => c !== cat);
                saveCategories();
            }
        }

        function saveCategories() {
            localStorage.setItem('gwapo_categories_v2', JSON.stringify(categories));
            render();
        }

        function renderCategories() {
            const catList = document.getElementById('catList');
            catList.innerHTML = '';
            categories.forEach(cat => {
                catList.innerHTML += `
                    <div class="bg-purple-500/20 border border-purple-500/50 px-3 py-1 rounded-full flex items-center gap-2">
                        <span class="text-[9px] text-purple-200">${cat}</span>
                        <button onclick="removeCategory('${cat}')" class="text-purple-400 font-bold hover:text-red-400">×</button>
                    </div>
                `;
            });
        }

        function toggleQuest(id) {
            const q = quests.find(i => i.id === id);
            q.completed = !q.completed;
            if (q.completed) {
                totalXP += 50; 
                if (!dex.find(p => p.pokeID === q.pokeID)) dex.push({ pokeID: q.pokeID, pokeName: q.pokeName });
            } else {
                totalXP = Math.max(0, totalXP - 50);
            }
            save();
        }

        function deleteQuest(id) {
            if(confirm("Discard mission?")) {
                quests = quests.filter(i => i.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('gwapo_tasks_v5', JSON.stringify(quests));
            localStorage.setItem('gwapo_dex_v3', JSON.stringify(dex));
            localStorage.setItem('gwapo_xp', JSON.stringify(totalXP));
            render();
        }

        function render() {
            const storyContainer = document.getElementById('storyContainer');
            const collectionGrid = document.getElementById('collectionGrid');
            const doneList = document.getElementById('doneList');
            const categorySelect = document.getElementById('categorySelect');

            const currentSelected = categorySelect.value;
            categorySelect.innerHTML = '';
            if (categories.length === 0) {
                categorySelect.innerHTML = `<option disabled selected>No Arcs Created</option>`;
            } else {
                categories.forEach(cat => {
                    categorySelect.innerHTML += `<option value="${cat}" ${cat === currentSelected ? 'selected' : ''}>${cat}</option>`;
                });
            }

            storyContainer.innerHTML = '';
            collectionGrid.innerHTML = '';
            doneList.innerHTML = '';

            if (categories.length === 0) {
                storyContainer.innerHTML = `<p class="text-[10px] text-slate-600 text-center py-10 italic">No Active Campaign. Use 'Manage Arcs' to begin.</p>`;
            }

            categories.forEach(cat => {
                const activeInCat = quests.filter(q => q.category === cat && !q.completed);
                if (activeInCat.length > 0) {
                    const section = document.createElement('div');
                    section.innerHTML = `
                        <div class="category-header">
                            <h3 class="pixel-font text-[8px] text-purple-400 uppercase tracking-widest">${cat}</h3>
                        </div>
                        <div class="space-y-3" id="list-${cat.replace(/\s/g, '')}"></div>
                    `;
                    storyContainer.appendChild(section);
                    const listDiv = document.getElementById(`list-${cat.replace(/\s/g, '')}`);
                    activeInCat.forEach(q => {
                        const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${q.pokeID}.png`;
                        listDiv.innerHTML += `
                            <div class="task-card p-3 rounded-xl flex items-center gap-4">
                                <img src="${sprite}" class="w-12 h-12 pixelated brightness-0 opacity-10">
                                <p class="flex-grow text-sm font-semibold text-slate-200">${q.text}</p>
                                <div class="flex gap-2">
                                    <button onclick="toggleQuest(${q.id})" class="p-2 text-green-400 text-lg">✓</button>
                                    <button onclick="deleteQuest(${q.id})" class="p-2 text-red-500 text-lg">×</button>
                                </div>
                            </div>
                        `;
                    });
                }
            });

            quests.filter(q => q.completed).forEach(q => {
                const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${q.pokeID}.png`;
                doneList.innerHTML += `
                    <div class="flex items-center gap-3 p-2 bg-slate-900/30 rounded-lg border border-slate-800 text-left">
                        <img src="${sprite}" class="w-8 h-8 pixelated">
                        <p class="flex-grow text-xs line-through text-slate-500">${q.text} (${catAbbreviation(q.category)})</p>
                        <button onclick="toggleQuest(${q.id})" class="text-[10px] text-slate-600 px-2">Undo</button>
                    </div>
                `;
            });

            dex.forEach(p => {
                const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.pokeID}.png`;
                collectionGrid.innerHTML += `
                    <div class="dex-card p-2 text-center">
                        <img src="${sprite}" class="w-full pixelated mx-auto">
                        <p class="text-[7px] pixel-font text-green-400 mt-2">${p.pokeName}</p>
                    </div>
                `;
            });

            document.getElementById('stat-dex').innerText = dex.length;
            document.getElementById('xp-text').innerText = totalXP + " XP";
            const levelProgress = (totalXP % 500) / 5; 
            document.getElementById('xp-fill').style.width = levelProgress + "%";
            const completedCount = quests.filter(q => q.completed).length;
            const percent = quests.length > 0 ? Math.round((completedCount / quests.length) * 100) : 0;
            document.getElementById('stat-percent').innerText = percent + '%';
            document.getElementById('pendingCount').innerText = (quests.length - completedCount) + " ONGOING";
            renderCategories();
        }

        function catAbbreviation(cat) {
            if (!cat) return "??";
            return cat.split(' ').map(w => w[0]).join('').toUpperCase();
        }

        function clearAll() {
            if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); }
        }

        render();
    </script>
</body>
</html>
