<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOTTA DO 'EM ALL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4c1d95">

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-4">

<h1 class="text-xl font-bold mb-4">GOTTA DO 'EM ALL</h1>

<input id="taskInput" class="text-black p-2 rounded w-full mb-2" placeholder="Add task...">
<button id="addBtn" class="bg-purple-600 px-4 py-2 rounded w-full mb-4">Add</button>

<div id="taskList" class="space-y-2"></div>

<hr class="my-4">

<p>XP: <span id="xp">0</span></p>
<p>Energy: <span id="be">0</span></p>

<script>
// ==========================
// CONFIG
// ==========================
const CONFIG = {
  XP_GAIN: 50,
  BE_GAIN: 15,
  API: 'https://pokeapi.co/api/v2/pokemon/'
};

// ==========================
// STORAGE
// ==========================
const storage = {
  load(key, fallback) {
    try {
      return JSON.parse(localStorage.getItem(key)) ?? fallback;
    } catch {
      return fallback;
    }
  },
  save(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }
};

// ==========================
// STATE
// ==========================
const state = {
  tasks: storage.load('tasks', []),
  xp: storage.load('xp', 0),
  be: storage.load('be', 0)
};

// ==========================
// API CACHE
// ==========================
const cache = new Map();

async function getPokemon(id) {
  if (cache.has(id)) return cache.get(id);

  const res = await fetch(CONFIG.API + id);
  const data = await res.json();

  const result = {
    name: data.name.toUpperCase(),
    type: data.types[0].type.name
  };

  cache.set(id, result);
  return result;
}

// ==========================
// STATE UPDATE
// ==========================
function update(fn) {
  fn(state);
  persist();
  render();
}

function persist() {
  storage.save('tasks', state.tasks);
  storage.save('xp', state.xp);
  storage.save('be', state.be);
}

// ==========================
// ACTIONS
// ==========================
async function addTask() {
  const input = document.getElementById('taskInput');
  if (!input.value.trim()) return;

  const id = Math.floor(Math.random() * 151) + 1;
  const poke = await getPokemon(id);

  update(s => {
    s.tasks.push({
      id: Date.now(),
      text: input.value,
      done: false,
      poke
    });
  });

  input.value = '';
}

function toggleTask(id) {
  update(s => {
    const t = s.tasks.find(x => x.id === id);
    if (!t) return;

    t.done = !t.done;

    if (t.done) {
      s.xp += CONFIG.XP_GAIN;
      s.be += CONFIG.BE_GAIN;
    }
  });
}

// ==========================
// RENDER
// ==========================
function render() {
  renderTasks();
  renderStats();
}

function renderTasks() {
  const container = document.getElementById('taskList');
  container.innerHTML = state.tasks.map(t => `
    <div class="p-2 bg-slate-800 rounded flex justify-between">
      <span class="${t.done ? 'line-through text-gray-500' : ''}">
        ${t.text} (${t.poke.name})
      </span>
      <button onclick="toggleTask(${t.id})">✓</button>
    </div>
  `).join('');
}

function renderStats() {
  document.getElementById('xp').innerText = state.xp;
  document.getElementById('be').innerText = state.be;
}

// ==========================
// EVENTS
// ==========================
document.getElementById('addBtn').onclick = addTask;

// ==========================
// INIT
// ==========================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

render();
</script>

</body>
</html>
